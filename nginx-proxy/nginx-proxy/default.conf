# HTTPS only - khong can port 80
# (port 80 dang duoc dung boi service khac)

server {
    listen 443 ssl;
    server_name ptnl.mic1.edu.vn;

    # Chung chi Let's Encrypt (lay bang DNS Challenge)
    ssl_certificate     /etc/letsencrypt/live/ptnl.mic1.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptnl.mic1.edu.vn/privkey.pem;

    # Cai dat SSL bao mat
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;

    # Kich thuoc upload toi da 20MB
    client_max_body_size 20M;

    # Frontend (React app)
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Strapi API
    location /api/ {
        proxy_pass         http://backend:1337/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi file uploads
    location /uploads/ {
        proxy_pass         http://backend:1337/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi Admin panel
    location /admin/ {
        proxy_pass         http://backend:1337/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }
}
