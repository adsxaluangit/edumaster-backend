# ============================================================
# BUOC 1: Chi HTTP de certbot xac thuc domain
# Sau khi co cert, bo comment phan HTTPS o duoi
# ============================================================

server {
    listen 80;
    server_name ptnl.mic1.edu.vn www.ptnl.mic1.edu.vn;

    # Certbot dung path nay de xac thuc domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tat ca HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# BUOC 2: Bo comment phan nay sau khi chay certbot thanh cong
# ============================================================

server {
    listen 443 ssl;
    server_name ptnl.mic1.edu.vn www.ptnl.mic1.edu.vn;

    # Chung chi Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/ptnl.mic1.edu.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptnl.mic1.edu.vn/privkey.pem;

    # Cai dat SSL tot nhat
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Kich thuoc upload toi da 20MB
    client_max_body_size 20M;

    # Frontend (React app)
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Strapi API
    location /api/ {
        proxy_pass         http://backend:1337/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi uploads (anh, file)
    location /uploads/ {
        proxy_pass         http://backend:1337/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi Admin panel
    location /admin/ {
        proxy_pass         http://backend:1337/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }
}
